<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/navbar :: head"></head>
<body>
<div th:replace="layout/navbar :: nav"></div>

<div class="main-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Carreras</h2>
        <a href="/carreras/nuevo" class="btn btn-primary-modern btn-modern">Nueva Carrera</a>
    </div>

    <div th:if="${success}" class="alert alert-modern alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-modern alert-danger" th:text="${error}"></div>

    <div class="table-modern">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Código</th>
                <th>Nombre</th>
                <th>Descripción</th>
                <th>Duración</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="carrera : ${carreras}">
                <td th:text="${carrera.id}">1</td>
                <td th:text="${carrera.codigo}">IS01</td>
                <td th:text="${carrera.nombre}">Ingeniería</td>
                <td th:text="${carrera.descripcion}">-</td>
                <td th:text="${carrera.duracionSemestres}">10</td>
                <td>
                    <a th:href="@{/carreras/editar/{id}(id=${carrera.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/carreras/eliminar/{id}(id=${carrera.id})}" class="btn btn-sm btn-danger-modern"
                       onclick="return confirm('¿Eliminar esta carrera?')">Eliminar</a>
                </td>
            </tr>
            <tr th:if="${carreras.isEmpty()}">
                <td colspan="6" class="text-center">No hay carreras registradas</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
