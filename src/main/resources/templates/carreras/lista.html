<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/navbar :: head"></head>
<body>
<div th:replace="layout/navbar :: nav"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 th:text="${titulo}">Listado</h2>
        <a href="/carreras/nuevo" class="btn btn-primary">Nueva Carrera</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>Código</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Duración (semestres)</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="carrera : ${carreras}">
            <td th:text="${carrera.id}">1</td>
            <td th:text="${carrera.codigo}">IS01</td>
            <td th:text="${carrera.nombre}">Ingeniería</td>
            <td th:text="${carrera.descripcion}">-</td>
            <td th:text="${carrera.duracionSemestres}">10</td>
            <td>
                <a th:href="@{/carreras/editar/{id}(id=${carrera.id})}" class="btn btn-sm btn-warning">Editar</a>
                <a th:href="@{/carreras/eliminar/{id}(id=${carrera.id})}" class="btn btn-sm btn-danger"
                   onclick="return confirm('¿Eliminar esta carrera?')">Eliminar</a>
            </td>
        </tr>
        <tr th:if="${carreras.isEmpty()}">
            <td colspan="6" class="text-center">No hay carreras registradas</td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
