<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/navbar :: head"></head>
<body>
<div th:replace="layout/navbar :: nav"></div>

<div class="main-container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="form-modern">
                <h3 class="mb-4" th:text="${titulo}">Formulario</h3>

                <div th:if="${error}" class="alert alert-modern alert-danger" th:text="${error}"></div>

                <form th:action="${accion == 'Crear' ? '/carreras/guardar' : '/carreras/actualizar/' + carrera.id}" th:object="${carrera}" method="post">

                    <div class="mb-3">
                        <label class="form-label">Codigo</label>
                        <input type="text" class="form-control" th:field="*{codigo}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Descripcion</label>
                        <textarea class="form-control" th:field="*{descripcion}" rows="3"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Duracion (semestres)</label>
                        <input type="number" class="form-control" th:field="*{duracionSemestres}">
                    </div>

                    <div class="text-end">
                        <a href="/carreras" class="btn btn-secondary btn-modern">Cancelar</a>
                        <button type="submit" class="btn btn-primary-modern btn-modern" th:text="${accion}">Guardar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
