<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/navbar :: head"></head>
<body>
<div th:replace="layout/navbar :: nav"></div>

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 th:text="${titulo}">Formulario</h3>
                </div>
                <div class="card-body">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

                    <form th:action="${accion == 'Crear' ? '/carreras/guardar' : '/carreras/actualizar/' + carrera.id}"
                          th:object="${carrera}" method="post">

                        <div class="mb-3">
                            <label class="form-label">Código:</label>
                            <input type="text" class="form-control" th:field="*{codigo}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Nombre:</label>
                            <input type="text" class="form-control" th:field="*{nombre}" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Descripción:</label>
                            <textarea class="form-control" th:field="*{descripcion}" rows="3"></textarea>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Duración (semestres):</label>
                            <input type="number" class="form-control" th:field="*{duracionSemestres}">
                        </div>

                        <div class="text-center">
                            <button type="submit" class="btn btn-primary" th:text="${accion}">Guardar</button>
                            <a href="/carreras" class="btn btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
