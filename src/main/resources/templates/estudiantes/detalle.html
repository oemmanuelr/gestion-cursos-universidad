<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/navbar :: head"></head>
<body>
<div th:replace="layout/navbar :: nav"></div>

<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h3 th:text="${titulo}">Detalle</h3>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <p><strong>Carnet:</strong> <span th:text="${estudiante.carnet}"></span></p>
                    <p><strong>Nombre Completo:</strong> <span th:text="${estudiante.nombreCompleto}"></span></p>
                    <p><strong>Email:</strong> <span th:text="${estudiante.email}"></span></p>
                    <p><strong>Teléfono:</strong> <span th:text="${estudiante.telefono}"></span></p>
                    <p><strong>Estado:</strong>
                        <span th:if="${estudiante.activo}" class="badge bg-success">Activo</span>
                        <span th:unless="${estudiante.activo}" class="badge bg-danger">Inactivo</span>
                    </p>
                </div>
                <div class="col-md-6">
                    <p><strong>Cursos inscritos:</strong></p>
                    <ul>
                        <li th:each="curso : ${estudiante.cursos}" th:text="${curso.nombre + ' - ' + curso.codigo}"></li>
                        <li th:if="${estudiante.cursos.isEmpty()}">No está inscrito en ningún curso</li>
                    </ul>
                </div>
            </div>
            <div class="text-center mt-3">
                <a href="/estudiantes" class="btn btn-secondary">Volver</a>
                <a th:href="@{/estudiantes/editar/{id}(id=${estudiante.id})}" class="btn btn-warning">Editar</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
