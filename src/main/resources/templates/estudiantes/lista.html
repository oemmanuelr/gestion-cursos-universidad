<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/navbar :: head"></head>
<body>
<div th:replace="layout/navbar :: nav"></div>

<div class="main-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Estudiantes</h2>
        <a href="/estudiantes/nuevo" class="btn btn-primary-modern btn-modern">Nuevo Estudiante</a>
    </div>

    <div th:if="${success}" class="alert alert-modern alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-modern alert-danger" th:text="${error}"></div>

    <div class="table-modern">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Carnet</th>
                <th>Nombre Completo</th>
                <th>Email</th>
                <th>Telefono</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="estudiante : ${estudiantes}">
                <td th:text="${estudiante.id}">1</td>
                <td th:text="${estudiante.carnet}">SA24010123</td>
                <td th:text="${estudiante.nombreCompleto}">Carlos Perez</td>
                <td th:text="${estudiante.email}">carlos@mail.com</td>
                <td th:text="${estudiante.telefono}">12345678</td>
                <td>
                    <span th:if="${estudiante.activo}" class="badge-active">Activo</span>
                    <span th:unless="${estudiante.activo}" class="badge-inactive">Inactivo</span>
                </td>
                <td>
                    <a th:href="@{/estudiantes/detalle/{id}(id=${estudiante.id})}" class="btn btn-sm btn-info">Ver</a>
                    <a th:href="@{/estudiantes/editar/{id}(id=${estudiante.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/estudiantes/eliminar/{id}(id=${estudiante.id})}" class="btn btn-sm btn-danger-modern" onclick="return confirm('¿Eliminar este estudiante?')">Eliminar</a>
                </td>
            </tr>
            <tr th:if="${estudiantes.isEmpty()}">
                <td colspan="7" class="text-center">No hay estudiantes registrados</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
