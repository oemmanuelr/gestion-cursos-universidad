<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Universitario</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Barra de navegación -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="/">🏫 Sistema Universitario</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/carreras">📚 Carreras</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/estudiantes">👨‍🎓 Estudiantes</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/cursos">📖 Cursos</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Contenido principal -->
<div class="container mt-4">
    <div class="row">
        <div class="col-md-12 text-center">
            <h1 class="display-4">🎓 Bienvenido al Sistema Universitario</h1>
            <p class="lead">Gestión de Carreras, Estudiantes y Cursos</p>
            <hr>
        </div>
    </div>

    <div class="row mt-5">
        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h2 class="display-4" th:text="${totalCarreras}">0</h2>
                    <p class="card-text">Carreras Registradas</p>
                    <a href="/carreras" class="btn btn-primary">Ver Carreras</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h2 class="display-4" th:text="${totalEstudiantes}">0</h2>
                    <p class="card-text">Estudiantes Registrados</p>
                    <a href="/estudiantes" class="btn btn-success">Ver Estudiantes</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card text-center">
                <div class="card-body">
                    <h2 class="display-4" th:text="${totalCursos}">0</h2>
                    <p class="card-text">Cursos Registrados</p>
                    <a href="/cursos" class="btn btn-info">Ver Cursos</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
