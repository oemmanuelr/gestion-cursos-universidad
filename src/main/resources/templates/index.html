<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="layout/navbar :: head"></head>
<body>
<div th:replace="layout/navbar :: nav"></div>

<div class="main-container">
    <div class="hero-section">
        <h1>Bienvenido al Sistema Universitario</h1>
        <p>Gestión centralizada de carreras, estudiantes y cursos</p>
    </div>

    <div class="row g-4">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number" th:text="${totalCarreras}">0</div>
                <div class="stat-label">Carreras Registradas</div>
                <a href="/carreras" class="btn btn-primary-modern btn-modern mt-3">Ver Carreras</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number" th:text="${totalEstudiantes}">0</div>
                <div class="stat-label">Estudiantes Registrados</div>
                <a href="/estudiantes" class="btn btn-primary-modern btn-modern mt-3">Ver Estudiantes</a>
            </div>
        </div>

        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number" th:text="${totalCursos}">0</div>
                <div class="stat-label">Cursos Registrados</div>
                <a href="/cursos" class="btn btn-primary-modern btn-modern mt-3">Ver Cursos</a>
            </div>
        </div>
    </div>
</div>

<div class="footer-modern">
    <div class="container">
        <p>Sistema Universitario &copy; 2026 - Todos los derechos reservados</p>
    </div>
</div>

</body>
</html>
