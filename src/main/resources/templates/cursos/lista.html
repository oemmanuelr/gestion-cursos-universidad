<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head th:replace="layout/navbar :: head"></head>
<body>
<div th:replace="layout/navbar :: nav"></div>

<div class="main-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Cursos</h2>
        <a href="/cursos/nuevo" class="btn btn-primary-modern btn-modern">Nuevo Curso</a>
    </div>

    <div th:if="${success}" class="alert alert-modern alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-modern alert-danger" th:text="${error}"></div>

    <div class="table-modern">
        <table class="table">
            <thead>
            <tr>
                <th>ID</th>
                <th>Codigo</th>
                <th>Nombre</th>
                <th>Descripcion</th>
                <th>Cupo Maximo</th>
                <th>Estudiantes</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="curso : ${cursos}">
                <td th:text="${curso.id}">1</td>
                <td th:text="${curso.codigo}">WEB01</td>
                <td th:text="${curso.nombre}">Programacion Web</td>
                <td th:text="${curso.descripcion}">-</td>
                <td th:text="${curso.cupoMaximo}">30</td>
                <td th:text="${curso.estudiantes.size()}">0</td>
                <td>
                    <a th:href="@{/cursos/editar/{id}(id=${curso.id})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/cursos/eliminar/{id}(id=${curso.id})}" class="btn btn-sm btn-danger-modern" onclick="return confirm('¿Eliminar este curso?')">Eliminar</a>
                </td>
            </tr>
            <tr th:if="${cursos.isEmpty()}">
                <td colspan="7" class="text-center">No hay cursos registrados</td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
