<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="layout/navbar :: head"></head>
<body>
<div th:replace="layout/navbar :: nav"></div>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2>Listado de Cursos</h2>
        <a href="/cursos/nuevo" class="btn btn-primary">Nuevo Curso</a>
    </div>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <table class="table table-striped table-hover">
        <thead>
        <tr>
            <th>ID</th>
            <th>Código</th>
            <th>Nombre</th>
            <th>Descripción</th>
            <th>Cupo Máximo</th>
            <th>Estudiantes</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="curso : ${cursos}">
            <td th:text="${curso.id}">1</td>
            <td th:text="${curso.codigo}">WEB01</td>
            <td th:text="${curso.nombre}">Programación Web</td>
            <td th:text="${curso.descripcion}">-</td>
            <td th:text="${curso.cupoMaximo}">30</td>
            <td th:text="${curso.estudiantes.size()}">0</td>
            <td>
                <a th:href="@{/cursos/editar/{id}(id=${curso.id})}" class="btn btn-sm btn-warning">Editar</a>
                <a th:href="@{/cursos/eliminar/{id}(id=${curso.id})}" class="btn btn-sm btn-danger"
                   onclick="return confirm('¿Eliminar este curso?')">Eliminar</a>
            </td>
        </tr>
        <tr th:if="${cursos.isEmpty()}">
            <td colspan="7" class="text-center">No hay cursos registrados</td>
        </tr>
        </tbody>
    </table>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
